name: GTK4 Test Suite

on:
  push:
  pull_request:

jobs:
  test-gtk4:
    name: Test (GTK4)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi python3-gi-cairo gir1.2-gtk-4.0 gir1.2-vte-2.91 libvte-2.91-0 xvfb

      - name: Use system Python & install Python dependencies
        run: |
          # Use system python so apt-installed python3-gi / python3-cairo are available
          sudo apt-get install -y --no-install-recommends python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest psutil configobj

      - name: Diagnostics: verify runtime imports
        run: |
          echo "-- python info --"
          python3 -c "import sys,sysconfig; print(sys.executable); print(sys.version); print('\n'.join(sys.path))"
          echo "\n-- pip list --"
          python3 -m pip list
          echo "\n-- import smoke tests --"
          python3 - <<'PY'
import sys
mods = ('gi','cairo','psutil','configobj')
for m in mods:
    try:
        __import__(m)
        print(m, 'OK')
    except Exception as e:
        print(m, 'FAILED:', type(e).__name__, e)
PY

      - name: Run tests under Xvfb (system python)
        run: |
          xvfb-run -s "-screen 0 1280x1024x24" python3 -m pytest -q
